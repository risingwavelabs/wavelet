<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wavelet React Leaderboard</title>
  <style>
    :root {
      --bg: #0f1a17;
      --bg-accent: #18312a;
      --panel: rgba(19, 32, 28, 0.92);
      --panel-strong: rgba(25, 43, 37, 0.96);
      --border: rgba(143, 191, 171, 0.18);
      --text: #f3fbf7;
      --muted: #9db8ac;
      --accent: #69e6b1;
      --accent-soft: rgba(105, 230, 177, 0.14);
      --warn: #fbbf24;
      --error: #fb7185;
      --shadow: 0 24px 70px rgba(2, 10, 8, 0.34);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(105, 230, 177, 0.18), transparent 36%),
        radial-gradient(circle at right, rgba(114, 255, 214, 0.08), transparent 22%),
        linear-gradient(180deg, #09100e 0%, var(--bg) 100%);
      padding: 32px 18px 48px;
    }

    .app {
      max-width: 1080px;
      margin: 0 auto;
      display: grid;
      gap: 20px;
    }

    .hero {
      display: grid;
      gap: 12px;
    }

    .eyebrow {
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.16em;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 5vw, 4rem);
      letter-spacing: -0.05em;
      line-height: 0.95;
    }

    .lede {
      margin: 0;
      max-width: 760px;
      color: var(--muted);
      line-height: 1.7;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.7fr) minmax(290px, 0.95fr);
      gap: 20px;
    }

    .panel {
      background: linear-gradient(180deg, var(--panel-strong), var(--panel));
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 20px 22px;
      border-bottom: 1px solid var(--border);
    }

    .panel-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      font-weight: 700;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.04);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--warn);
    }

    .status.live .status-dot { background: var(--accent); }
    .status.error .status-dot { background: var(--error); }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 14px 22px;
      text-align: left;
    }

    th {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 11px;
      font-weight: 700;
    }

    td {
      border-top: 1px solid rgba(157, 184, 172, 0.08);
      font-variant-numeric: tabular-nums;
    }

    .rank { width: 64px; color: var(--muted); }
    .score { font-weight: 700; }

    .row-updated {
      animation: rowPulse 0.55s ease-out;
    }

    @keyframes rowPulse {
      from { background: var(--accent-soft); }
      to { background: transparent; }
    }

    .sidebar {
      display: grid;
      gap: 20px;
    }

    .controls {
      padding: 22px;
      display: grid;
      gap: 12px;
    }

    .controls p,
    .meta p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    button {
      border: 0;
      border-radius: 16px;
      padding: 14px 16px;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: 0.65; cursor: progress; transform: none; }

    .primary {
      background: linear-gradient(180deg, #7bf0bf, #4fd59f);
      color: #0a1712;
    }

    .secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .meta {
      padding: 0 22px 22px;
      display: grid;
      gap: 10px;
    }

    .log {
      max-height: 380px;
      overflow: auto;
      padding: 8px 0;
    }

    .log-entry {
      padding: 12px 22px;
      border-top: 1px solid rgba(157, 184, 172, 0.08);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.55;
    }

    .log-entry strong { color: var(--text); }

    .empty {
      padding: 48px 22px;
      color: var(--muted);
      text-align: center;
    }

    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.95em;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    import React from 'https://esm.sh/react@18'
    import { createRoot } from 'https://esm.sh/react-dom@18/client'
    import { WaveletClient } from '../../packages/sdk/browser/index.browser.js'

    const client = new WaveletClient({ url: 'http://localhost:8080' })
    const leaderboardView = client.view('leaderboard')
    const gameEvents = client.stream('game_events')
    const players = ['alice', 'bob', 'charlie', 'dave', 'eve', 'frank', 'grace', 'heidi']

    const e = React.createElement

    function StatusBadge({ status }) {
      const className = `status ${status.kind}`
      return e('div', { className }, [
        e('span', { key: 'dot', className: 'status-dot' }),
        e('span', { key: 'label' }, status.label),
      ])
    }

    function LeaderboardTable({ rows, highlighted }) {
      if (rows.length === 0) {
        return e('div', { className: 'empty' }, 'No scores yet. Emit a score to get started.')
      }

      return e('table', null, [
        e('thead', { key: 'head' },
          e('tr', null, [
            e('th', { key: 'rank', className: 'rank' }, '#'),
            e('th', { key: 'player' }, 'Player'),
            e('th', { key: 'score' }, 'Score'),
            e('th', { key: 'games' }, 'Games'),
          ])
        ),
        e('tbody', { key: 'body' },
          rows.map((row, index) =>
            e('tr', {
              key: row.player_id,
              className: highlighted.has(row.player_id) ? 'row-updated' : '',
            }, [
              e('td', { key: 'rank', className: 'rank' }, index + 1),
              e('td', { key: 'player' }, row.player_id),
              e('td', { key: 'score', className: 'score' }, Number(row.total_score || 0)),
              e('td', { key: 'games' }, Number(row.games_played || 0)),
            ])
          )
        ),
      ])
    }

    function LogPanel({ logs }) {
      if (logs.length === 0) {
        return e('div', { className: 'empty' }, 'No events yet.')
      }

      return e('div', { className: 'log' },
        logs.map((entry, index) =>
          e('div', { key: `${entry.time}-${index}`, className: 'log-entry' }, [
            e('strong', { key: 'time' }, `[${entry.time}] `),
            `${entry.message}${entry.detail ? ` ${entry.detail}` : ''}`,
          ])
        )
      )
    }

    function App() {
      const [rows, setRows] = React.useState([])
      const [status, setStatus] = React.useState({ kind: '', label: 'Connecting' })
      const [logs, setLogs] = React.useState([])
      const [pending, setPending] = React.useState(false)
      const [highlighted, setHighlighted] = React.useState(new Set())

      const addLog = React.useCallback((message, detail = '') => {
        const time = new Date().toLocaleTimeString()
        setLogs((current) => [{ time, message, detail }, ...current].slice(0, 80))
      }, [])

      React.useEffect(() => {
        let cancelled = false

        leaderboardView.get()
          .then((initialRows) => {
            if (cancelled) return
            initialRows.sort((a, b) => Number(b.total_score || 0) - Number(a.total_score || 0))
            setRows(initialRows)
            addLog('Fetched initial leaderboard', `${initialRows.length} row(s)`)
          })
          .catch((error) => {
            if (cancelled) return
            setStatus({ kind: 'error', label: 'Fetch Error' })
            addLog('Initial fetch failed', error.message)
          })

        const unsubscribe = leaderboardView.subscribe({
          onOpen() {
            if (cancelled) return
            setStatus({ kind: 'live', label: 'Live' })
            addLog('WebSocket connected')
          },
          onData(diff) {
            if (cancelled) return

            setRows((current) => {
              const next = new Map(current.map((row) => [row.player_id, row]))

              for (const row of diff.deleted) next.delete(row.player_id)
              for (const row of diff.inserted) next.set(row.player_id, row)
              for (const row of diff.updated) next.set(row.player_id, row)

              return Array.from(next.values()).sort(
                (a, b) => Number(b.total_score || 0) - Number(a.total_score || 0)
              )
            })

            const changed = new Set([
              ...diff.inserted.map((row) => row.player_id),
              ...diff.updated.map((row) => row.player_id),
            ])

            setHighlighted(changed)
            window.clearTimeout(App.highlightTimer)
            App.highlightTimer = window.setTimeout(() => setHighlighted(new Set()), 420)
            addLog('Received diff', `+${diff.inserted.length} ~${diff.updated.length} -${diff.deleted.length}`)
          },
          onReconnect() {
            if (cancelled) return
            setStatus({ kind: '', label: 'Reconnecting' })
            addLog('Subscription reconnecting')
          },
          onError(error) {
            if (cancelled) return
            setStatus({ kind: 'error', label: 'Subscription Error' })
            addLog('Subscription error', error.message)
          },
        })

        return () => {
          cancelled = true
          unsubscribe()
          window.clearTimeout(App.highlightTimer)
        }
      }, [addLog])

      async function emitRandomScore() {
        setPending(true)
        try {
          const player = players[Math.floor(Math.random() * players.length)]
          const score = Math.floor(Math.random() * 100) + 1
          await gameEvents.emit({ player_id: player, score, event_type: 'game' })
          addLog('Emitted score', `${player} +${score}`)
        } catch (error) {
          addLog('Emit failed', error.message)
        } finally {
          setPending(false)
        }
      }

      async function emitBatchScores() {
        setPending(true)
        try {
          const events = Array.from({ length: 10 }, () => ({
            player_id: players[Math.floor(Math.random() * players.length)],
            score: Math.floor(Math.random() * 100) + 1,
            event_type: 'game',
          }))
          await gameEvents.emitBatch(events)
          addLog('Emitted batch', `${events.length} event(s)`)
        } catch (error) {
          addLog('Batch emit failed', error.message)
        } finally {
          setPending(false)
        }
      }

      return e('div', { className: 'app' }, [
        e('section', { key: 'hero', className: 'hero' }, [
          e('div', { key: 'eyebrow', className: 'eyebrow' }, 'Wavelet React Example'),
          e('h1', { key: 'title' }, 'Leaderboard with React diffing'),
          e('p', { key: 'lede', className: 'lede' },
            'This example uses React state updates for the table and the browser ESM build of WaveletClient for reads, subscriptions, and event writes. The table rows stay stable because React reconciles them by player id.'
          ),
        ]),
        e('section', { key: 'layout', className: 'layout' }, [
          e('article', { key: 'table', className: 'panel' }, [
            e('div', { key: 'header', className: 'panel-header' }, [
              e('div', { key: 'title', className: 'panel-title' }, 'Live Leaderboard'),
              e(StatusBadge, { key: 'status', status }),
            ]),
            e(LeaderboardTable, { key: 'content', rows, highlighted }),
          ]),
          e('aside', { key: 'sidebar', className: 'sidebar' }, [
            e('section', { key: 'controls', className: 'panel' }, [
              e('div', { key: 'header', className: 'panel-header' },
                e('div', { className: 'panel-title' }, 'Controls')
              ),
              e('div', { key: 'controls', className: 'controls' }, [
                e('p', { key: 'body' }, 'React handles DOM diffing here, while Wavelet pushes view diffs over WebSocket.'),
                e('button', {
                  key: 'single',
                  className: 'primary',
                  disabled: pending,
                  onClick: emitRandomScore,
                }, pending ? 'Sending...' : 'Emit Random Score'),
                e('button', {
                  key: 'batch',
                  className: 'secondary',
                  disabled: pending,
                  onClick: emitBatchScores,
                }, pending ? 'Sending...' : 'Emit Batch of 10'),
              ]),
              e('div', { key: 'meta', className: 'meta' }, [
                e('p', { key: 'sdk' }, e('code', null, "import { WaveletClient } from '../../packages/sdk/browser/index.browser.js'")),
                e('p', { key: 'react' }, 'React and ReactDOM are loaded from esm.sh for this zero-build example.'),
              ]),
            ]),
            e('section', { key: 'log', className: 'panel' }, [
              e('div', { key: 'header', className: 'panel-header' },
                e('div', { className: 'panel-title' }, 'Event Log')
              ),
              e(LogPanel, { key: 'content', logs }),
            ]),
          ]),
        ]),
      ])
    }

    App.highlightTimer = null

    createRoot(document.getElementById('root')).render(e(App))
  </script>
</body>
</html>
