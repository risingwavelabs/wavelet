name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: |
          cd packages/config && npx tsc && cd ../..
          cd packages/server && npx tsc && cd ../..
          cd packages/sdk && npm run build && cd ../..
          cd packages/cli && npx tsc && cd ../..
          cd packages/mcp && npx tsc && cd ../..

      - name: Run tests
        run: npx vitest run
