name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Clean nested node_modules
        run: |
          rm -rf packages/*/node_modules/@risingwave

      - name: Build packages
        run: |
          npx tsc -p packages/config/tsconfig.json
          npx tsc -p packages/server/tsconfig.json
          npx tsc -p packages/sdk/tsconfig.json
          npx tsc -p packages/sdk/tsconfig.browser.json
          npx tsc -p packages/cli/tsconfig.json
          npx tsc -p packages/mcp/tsconfig.json

      - name: Run tests
        run: npx vitest run
