name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Debug workspace resolution
        run: |
          ls -la node_modules/@risingwave/
          node -e "console.log(require.resolve('@risingwave/wavelet/package.json'))"
          cat node_modules/@risingwave/wavelet/dist/types.d.ts 2>/dev/null | head -10 || echo "dist/types.d.ts not found"

      - name: Build packages (in dependency order)
        run: |
          cd packages/config && npx tsc && cd ../..
          cat node_modules/@risingwave/wavelet/dist/types.d.ts | head -10
          cd packages/server && npx tsc && cd ../..
          cd packages/sdk && npm run build && cd ../..
          cd packages/cli && npx tsc && cd ../..
          cd packages/mcp && npx tsc && cd ../..

      - name: Run tests
        run: npx vitest run
