name: Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          scope: '@risingwave'
          always-auth: true
          cache: 'npm'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Prepare release versions
        run: |
          CURRENT_VERSION=$(node -p 'require("./packages/config/package.json").version')
          VERSION=$(node -e "
            const [major, minor, patch] = process.argv[1].split('.').map(Number);
            const bump = process.argv[2];
            if (bump === 'major') {
              console.log(\`\${major + 1}.0.0\`);
            } else if (bump === 'minor') {
              console.log(\`\${major}.\${minor + 1}.0\`);
            } else if (bump === 'patch') {
              console.log(\`\${major}.\${minor}.\${patch + 1}\`);
            } else {
              throw new Error(\`Unsupported version bump: \${bump}\`);
            }
          " "$CURRENT_VERSION" "${{ inputs.version_bump }}")
          VERSION="$VERSION" node -e "
            const fs = require('fs');
            const path = require('path');
            const version = process.env.VERSION;
            const packageFiles = ['package.json'];
            for (const root of ['packages', 'examples']) {
              if (!fs.existsSync(root)) continue;
              for (const entry of fs.readdirSync(root, { withFileTypes: true })) {
                if (!entry.isDirectory()) continue;
                const file = path.join(root, entry.name, 'package.json');
                if (fs.existsSync(file)) {
                  packageFiles.push(file);
                }
              }
            }
            for (const file of packageFiles) {
              const pkg = JSON.parse(fs.readFileSync(file, 'utf8'));
              pkg.version = version;
              for (const dep of ['dependencies', 'devDependencies', 'peerDependencies']) {
                if (!pkg[dep]) continue;
                for (const name of Object.keys(pkg[dep])) {
                  if (name.startsWith('@risingwave/wavelet')) {
                    pkg[dep][name] = version;
                  }
                }
              }
              fs.writeFileSync(file, JSON.stringify(pkg, null, 2) + '\n');
            }
          "
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Refresh lockfile
        run: npm install --package-lock-only

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: |
          npm run build --workspace=packages/config
          npm run build --workspace=packages/server
          npm run build --workspace=packages/sdk
          npm run build --workspace=packages/cli
          npm run build --workspace=packages/mcp

      - name: Run tests
        run: npx vitest run

      - name: Commit and tag
        run: |
          git add -A
          git commit -m "chore(release): v${{ env.VERSION }}"
          git tag "v${{ env.VERSION }}"
          git push origin main --tags

      - name: Publish to npm
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "NPM_TOKEN secret is not configured for this repository." >&2
            exit 1
          fi
          npm whoami
          npm publish --workspaces --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        run: gh release create "v${{ env.VERSION }}" --generate-notes --title "v${{ env.VERSION }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
