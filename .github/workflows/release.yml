name: Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        run: |
          npm version ${{ inputs.version_bump }} --workspaces --no-git-tag-version
          npm version ${{ inputs.version_bump }} --no-git-tag-version
          echo "VERSION=$(node -p 'require("./package.json").version')" >> $GITHUB_ENV

      - name: Update cross-references
        run: |
          # Update workspace dependency versions to match
          for pkg in packages/*/package.json; do
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('$pkg', 'utf8'));
              for (const dep of ['dependencies', 'devDependencies', 'peerDependencies']) {
                if (!pkg[dep]) continue;
                for (const [name, ver] of Object.entries(pkg[dep])) {
                  if (name.startsWith('@risingwave/wavelet')) {
                    pkg[dep][name] = '${{ env.VERSION }}';
                  }
                }
              }
              fs.writeFileSync('$pkg', JSON.stringify(pkg, null, 2) + '\n');
            "
          done

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: |
          npx tsc --build packages/config/tsconfig.json
          npx tsc --build packages/server/tsconfig.json
          npx tsc --build packages/sdk/tsconfig.json
          npx tsc --build packages/cli/tsconfig.json
          npx tsc --build packages/mcp/tsconfig.json

      - name: Run tests
        run: npx vitest run

      - name: Commit and tag
        run: |
          git add -A
          git commit -m "chore(release): v${{ env.VERSION }}"
          git tag "v${{ env.VERSION }}"
          git push origin main --tags

      - name: Publish to npm
        run: npm publish --workspaces --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        run: gh release create "v${{ env.VERSION }}" --generate-notes --title "v${{ env.VERSION }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
